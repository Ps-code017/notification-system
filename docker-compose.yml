version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: notif_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - notif_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis
    container_name: notif_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - notif_redis_data:/data

volumes:
  notif_postgres_data:
  notif_redis_data: